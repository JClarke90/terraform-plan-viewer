name: Security Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run daily at 2 AM UTC to check for vulnerabilities
    - cron: '0 2 * * *'

permissions:
  contents: read
  security-events: write

jobs:
  audit:
    runs-on: ubuntu-latest
    name: Audit Dependencies
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        
    - name: Install dependencies
      run: pnpm install
      
    - name: Run pnpm audit
      run: pnpm audit --audit-level=moderate
      continue-on-error: true
      
    - name: Check for critical vulnerabilities
      run: |
        # Run pnpm audit and check exit code
        # Exit codes: 0 = no vulnerabilities, 1+ = vulnerabilities found
        if pnpm audit --audit-level=critical; then
          echo "No critical vulnerabilities found"
        else
          echo "::error::Critical vulnerabilities detected"
          exit 1
        fi
      continue-on-error: false

  snyk:
    runs-on: ubuntu-latest
    name: Snyk Security Scan
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        
    - name: Install dependencies
      run: pnpm install
      
    - name: Run Snyk to check for vulnerabilities
      uses: snyk/actions/node@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high
      continue-on-error: true
